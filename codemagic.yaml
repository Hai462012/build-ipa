workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest

    scripts:
      - npm install
      - chmod +x node_modules/.bin/cap
      - npx cap sync ios
      - cd ios
      - xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/**/*.app
      - ios/**/*.ipa